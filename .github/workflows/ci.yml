name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Verify widget loader sync
        run: |
          npm run build -w @cryptowire/widget
          if ! git diff --quiet -- apps/frontend/public/widget/widget.js; then
            echo "apps/frontend/public/widget/widget.js is out of sync with packages/widget source."
            echo "Run: npm run build -w @cryptowire/widget"
            git --no-pager diff -- apps/frontend/public/widget/widget.js
            exit 1
          fi
