name: Publish Widget Package

on:
  workflow_dispatch: {}
  push:
    tags:
      - "widget-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build widget package
        run: npm run build -w @cryptowire/widget

      - name: Publish to npm
        run: npm publish -w @cryptowire/widget --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
