name: Refresh CryptoWire news cache

on:
  schedule:
    # GitHub scheduled workflows run at best-effort; minimum granularity is 5 minutes.
    - cron: "*/12 * * * *"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Call API refresh endpoint
        env:
          API_BASE_URL: ${{ secrets.CRYPTOWIRE_API_BASE_URL }}
          REFRESH_SECRET: ${{ secrets.CRYPTOWIRE_REFRESH_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${API_BASE_URL:-}" ]; then
            echo "Missing secret: CRYPTOWIRE_API_BASE_URL (e.g. https://your-api.vercel.app)"
            exit 1
          fi

          if [ -z "${REFRESH_SECRET:-}" ]; then
            echo "Missing secret: CRYPTOWIRE_REFRESH_SECRET (must match NEWS_REFRESH_SECRET on the API)"
            exit 1
          fi

          base="${API_BASE_URL%/}"

          try_refresh() {
            url="${base}/news/refresh"
            payload='{"limit":30,"force":true,"sources":"coindesk,decrypt,cointelegraph,blockworks,bitcoin.com,cryptopotato,forbes,cryptopolitan,coinpaprika,seekingalpha,bitcoinist,newsbtc,utoday,investing_comcryptonews,ethereumfoundation,bitcoincore"}'
            echo "Requesting: ${url}"
            http_code=$(curl -sS -o /tmp/refresh_body.json -w "%{http_code}" \
              --retry 3 --retry-all-errors --retry-delay 5 \
              -X POST \
              -H "content-type: application/json" \
              -H "x-refresh-secret: ${REFRESH_SECRET}" \
              --data-raw "${payload}" \
              "${url}" || true)

            if [ "${http_code}" = "200" ]; then
              cat /tmp/refresh_body.json
              # If refresh succeeded but returned 0 items, emit stats + diagnose output to aid debugging.
              count=$(python3 -c 'import json; data=json.load(open("/tmp/refresh_body.json","r",encoding="utf-8")); print(int(data.get("count") or 0))')

              if [ "${count}" = "0" ]; then
                echo "Refresh returned count=0; fetching /stats and /news/diagnose for diagnostics..."
                curl -sS "${base}/stats" | cat || true
                curl -sS -X POST \
                  -H "content-type: application/json" \
                  -H "x-refresh-secret: ${REFRESH_SECRET}" \
                  --data-raw '{"limit":100}' \
                  "${base}/news/diagnose" | cat || true
              fi
              return 0
            fi

            echo "HTTP ${http_code}"
            cat /tmp/refresh_body.json || true
            return 1
          }

          # Explicit sources list keeps the store warm across all supported sources.
          try_refresh && exit 0

          echo "Refresh failed."
          exit 22
